version: '3'
services:
  # 645 + 720 전체 구매
  lotto-all:
    build: .
    container_name: lotto-all
    environment:
      - TZ=Asia/Seoul
      - PURCHASE_TARGET=all
    env_file:
      - .env.docker
    volumes:
      - ./state:/app/state
    restart: "no"

  # 645만 구매
  lotto-645:
    build: .
    container_name: lotto-645
    environment:
      - TZ=Asia/Seoul
      - PURCHASE_TARGET=645
      - LOTTO720_GAMES=0
    env_file:
      - .env.docker
    volumes:
      - ./state:/app/state
    restart: "no"

  # 720만 구매
  lotto-720:
    build: .
    container_name: lotto-720
    environment:
      - TZ=Asia/Seoul
      - PURCHASE_TARGET=720
      - AUTO_GAMES=0
      - MANUAL_NUMBERS=[]
    env_file:
      - .env.docker
    volumes:
      - ./state:/app/state
    restart: "no"

  # 당첨 확인 (645 + 720)
  lotto-check:
    build: .
    container_name: lotto-check
    environment:
      - TZ=Asia/Seoul
      - CHECK_TARGET=all
    env_file:
      - .env.docker
    volumes:
      - ./state:/app/state
    command: ["python", "src/check_winning.py"]
    restart: "no"

  # 당첨 확인 (645만)
  lotto-check-645:
    build: .
    container_name: lotto-check-645
    environment:
      - TZ=Asia/Seoul
      - CHECK_TARGET=645
    env_file:
      - .env.docker
    volumes:
      - ./state:/app/state
    command: ["python", "src/check_winning.py"]
    restart: "no"

  # 당첨 확인 (720만)
  lotto-check-720:
    build: .
    container_name: lotto-check-720
    environment:
      - TZ=Asia/Seoul
      - CHECK_TARGET=720
    env_file:
      - .env.docker
    volumes:
      - ./state:/app/state
    command: ["python", "src/check_winning.py"]
    restart: "no"

  # 텔레그램 버튼 봇 (상시 실행) - 구매/당첨확인/개수설정 콜백 처리
  lotto-bot:
    build: .
    container_name: lotto-bot
    environment:
      - TZ=Asia/Seoul
    env_file:
      - .env.docker
    volumes:
      - ./state:/app/state
    command: ["python", "src/bot.py"]
    restart: unless-stopped
