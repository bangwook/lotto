version: '3'
services:
  # 645 + 720 전체 구매
  lotto-all:
    build: .
    container_name: lotto-all
    environment:
      - TZ=Asia/Seoul
      - PURCHASE_TARGET=all
    env_file:
      - .env.docker
    restart: "no"

  # 645만 구매
  lotto-645:
    build: .
    container_name: lotto-645
    environment:
      - TZ=Asia/Seoul
      - PURCHASE_TARGET=645
      - LOTTO720_GAMES=0
    env_file:
      - .env.docker
    restart: "no"

  # 720만 구매
  lotto-720:
    build: .
    container_name: lotto-720
    environment:
      - TZ=Asia/Seoul
      - PURCHASE_TARGET=720
      - AUTO_GAMES=0
      - MANUAL_NUMBERS=[]
    env_file:
      - .env.docker
    restart: "no"

  # 당첨 확인
  lotto-check:
    build: .
    container_name: lotto-check
    environment:
      - TZ=Asia/Seoul
    env_file:
      - .env.docker
    command: ["bash", "-c", "rm -f /tmp/.X99-lock && Xvfb :99 -screen 0 1920x1080x24 -nolisten tcp & sleep 2 && export DISPLAY=:99 && python src/check_winning.py"]
    restart: "no"
