name: Lotto Purchase (Run on GitHub)

on:
  workflow_dispatch:
    inputs:
      target:
        description: '구매 대상'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - 645
          - 720
  schedule:
     # 매주 금요일 저녁 10시 KST (UTC 13:00)
     - cron: '0 13 * * 5'

jobs:
  purchase:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt
        playwright install --with-deps chromium

    - name: Create .env file
      run: |
        echo "USER_ID=${{ secrets.USER_ID }}" >> .env
        echo "PASSWD=${{ secrets.PASSWD }}" >> .env
        echo "CHARGE_PIN=${{ secrets.CHARGE_PIN }}" >> .env
        echo "AUTO_GAMES=${{ secrets.AUTO_GAMES || '0' }}" >> .env
        echo "MANUAL_NUMBERS=${{ secrets.MANUAL_NUMBERS || '[]' }}" >> .env
        echo "LOTTO720_GAMES=${{ secrets.LOTTO720_GAMES || '0' }}" >> .env
        echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
        echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
        ls -la .env

    - name: Run Lotto Purchase Workflow
      env:
        PYTHONPATH: src
        PURCHASE_TARGET: ${{ github.event.inputs.target || 'all' }}
      run: |
        echo "Purchase target: $PURCHASE_TARGET"
        python src/purchase_all.py

    - name: Upload debug screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: debug-screenshots
        path: "*.png"
        if-no-files-found: ignore
